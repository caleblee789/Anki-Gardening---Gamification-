<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
    
    <defs>
      <linearGradient id="potBody" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#c97b4a"/>
        <stop offset="100%" stop-color="#8f5334"/>
      </linearGradient>
      <linearGradient id="potLip" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#e0a071"/>
        <stop offset="100%" stop-color="#a8623f"/>
      </linearGradient>
      <linearGradient id="soilGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#6c4c3b"/>
        <stop offset="100%" stop-color="#4b3025"/>
      </linearGradient>
      <linearGradient id="leafGrad" x1="0" y1="0" x2="0.8" y2="1">
        <stop offset="0%" stop-color="#8ecf7a"/>
        <stop offset="100%" stop-color="#447a42"/>
      </linearGradient>
      <linearGradient id="leafGradDark" x1="0" y1="0" x2="0.8" y2="1">
        <stop offset="0%" stop-color="#6cab67"/>
        <stop offset="100%" stop-color="#2e5b31"/>
      </linearGradient>
      <linearGradient id="stemGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#6b8e52"/>
        <stop offset="100%" stop-color="#3d5a31"/>
      </linearGradient>
      <linearGradient id="goldGlow" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#fff6c7"/>
        <stop offset="100%" stop-color="#f4c85d"/>
      </linearGradient>
      <filter id="paint" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="1" seed="7" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.9" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
      <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
        <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#2a2019" flood-opacity="0.18"/>
      </filter>
      <filter id="rareGlow" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="6" result="blur"/>
      </filter>
      <radialGradient id="paperVignette" cx="50%" cy="35%" r="90%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.05"/>
        <stop offset="100%" stop-color="#9bb39a" stop-opacity="0.08"/>
      </radialGradient>
      
    </defs>
    
    
    
    <g filter="url(#softShadow)">
      <ellipse cx="128" cy="232" rx="48" ry="10" fill="#2b241f" opacity="0.12"/>
      <path d="M82 185 C88 178, 168 178, 174 185 L166 228 C165 234, 91 234, 90 228 Z" fill="url(#potBody)" stroke="#7a4730" stroke-width="2"/>
      <ellipse cx="128" cy="185" rx="47" ry="10" fill="url(#potLip)" stroke="#8c5437" stroke-width="2"/>
      <ellipse cx="128" cy="188" rx="39" ry="6.8" fill="url(#soilGrad)" opacity="0.96"/>
      <path d="M94 189 C107 185, 119 193, 130 189 C142 185, 152 191, 163 188" stroke="#7a5c4b" stroke-width="1.2" opacity="0.45" fill="none"/>
    </g>
    
<rect x="112" y="110" width="28" height="78" rx="13" fill="url(#leafGradDark)" stroke="#314d32" stroke-width="2.4" filter="url(#paint)"/>
<rect x="88" y="133" width="18" height="42" rx="9" fill="url(#leafGrad)" stroke="#3a593c" stroke-width="2.2" filter="url(#paint)"/>
<rect x="149" y="138" width="16" height="39" rx="8" fill="url(#leafGrad)" stroke="#3a593c" stroke-width="2.2" filter="url(#paint)"/>
<rect x="154" y="119" width="12" height="24" rx="6" fill="url(#leafGrad)" stroke="#3a593c" stroke-width="2.2" filter="url(#paint)"/>
<circle cx="119" cy="117" r="1.2" fill="#f6efcb"/>
<circle cx="126" cy="131" r="1.2" fill="#f6efcb"/>
<circle cx="132" cy="145" r="1.2" fill="#f6efcb"/>
<circle cx="119" cy="161" r="1.2" fill="#f6efcb"/>
<circle cx="129" cy="174" r="1.2" fill="#f6efcb"/>
<circle cx="96" cy="141" r="1.2" fill="#f6efcb"/>
<circle cx="100" cy="156" r="1.2" fill="#f6efcb"/>
<circle cx="155" cy="145" r="1.2" fill="#f6efcb"/>
<circle cx="160" cy="158" r="1.2" fill="#f6efcb"/>
    </svg>