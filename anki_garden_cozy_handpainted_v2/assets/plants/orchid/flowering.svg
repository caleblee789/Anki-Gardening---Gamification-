    <defs>
      <linearGradient id="potBody" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#c97b4a"/>
        <stop offset="100%" stop-color="#8f5334"/>
      </linearGradient>
      <linearGradient id="potLip" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#e0a071"/>
        <stop offset="100%" stop-color="#a8623f"/>
      </linearGradient>
      <linearGradient id="soilGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#6c4c3b"/>
        <stop offset="100%" stop-color="#4b3025"/>
      </linearGradient>
      <linearGradient id="leafGrad" x1="0" y1="0" x2="0.8" y2="1">
        <stop offset="0%" stop-color="#8ecf7a"/>
        <stop offset="100%" stop-color="#447a42"/>
      </linearGradient>
      <linearGradient id="leafGradDark" x1="0" y1="0" x2="0.8" y2="1">
        <stop offset="0%" stop-color="#6cab67"/>
        <stop offset="100%" stop-color="#2e5b31"/>
      </linearGradient>
      <linearGradient id="stemGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#6b8e52"/>
        <stop offset="100%" stop-color="#3d5a31"/>
      </linearGradient>
      <linearGradient id="goldGlow" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#fff6c7"/>
        <stop offset="100%" stop-color="#f4c85d"/>
      </linearGradient>
      <filter id="paint" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="1" seed="7" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.9" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
      <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
        <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#2a2019" flood-opacity="0.18"/>
      </filter>
      <filter id="rareGlow" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="6" result="blur"/>
      </filter>
      <radialGradient id="paperVignette" cx="50%" cy="35%" r="90%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.05"/>
        <stop offset="100%" stop-color="#9bb39a" stop-opacity="0.08"/>
      </radialGradient>
      
    </defs>
    
    
    
